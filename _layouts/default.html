<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "de" }}">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    {%- seo -%}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    {%- feed_meta -%}
    {%- if jekyll.environment == 'production' and site.google_analytics -%}
      {%- include google-analytics.html -%}
    {%- endif -%}

    <!-- Prevent FOUC: apply saved theme before render -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        } else {
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        }
      })();
    </script>
  </head>

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- Theme toggle logic -->
    <script>
      (function() {
        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;

        toggle.addEventListener('click', function() {
          var html = document.documentElement;
          var current = html.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';

          html.classList.add('theme-transition');
          html.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);

          setTimeout(function() {
            html.classList.remove('theme-transition');
          }, 400);
        });

        // Listen for system preference changes (when no manual override)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          if (!localStorage.getItem('theme')) {
            var html = document.documentElement;
            html.classList.add('theme-transition');
            html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            setTimeout(function() { html.classList.remove('theme-transition'); }, 400);
          }
        });
      })();
    </script>

  </body>

</html>
