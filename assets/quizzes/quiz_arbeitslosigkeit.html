<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Arbeitslosigkeit & Arbeitsmarktpolitik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📊 Arbeitslosigkeit & Arbeitsmarktpolitik</h1>
            <p>Teste dein Wissen über Arbeitslosenquote, Arten der Arbeitslosigkeit und politische Maßnahmen</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionArea"></div>

            <div class="results-container" id="resultsContainer">
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Deine Punktzahl</div>
                </div>
                <div class="result-message" id="resultMessage"></div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctAnswers">0</div>
                        <div class="result-stat-label">Richtig</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectAnswers">0</div>
                        <div class="result-stat-label">Falsch</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalQuestions">15</div>
                        <div class="result-stat-label">Fragen</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>

            <div class="controls" id="controls">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()" disabled>← Zurück</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Weiter →</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Eine Person gilt als arbeitslos, wenn sie unter anderem:",
                options: [
                    "Mehr als 10 Stunden pro Woche arbeitet",
                    "Weniger als 1 Stunde pro Woche erwerbstätig ist",
                    "Nur Teilzeit arbeitet (bis 20 Stunden/Woche)",
                    "Ausschließlich geringfügig beschäftigt ist"
                ],
                correct: 1,
                explanation: "Laut Definition gilt als arbeitslos, wer weniger als 1 Stunde pro Woche erwerbstätig ist, dem Arbeitsmarkt zur Verfügung steht und aktiv eine Beschäftigung sucht."
            },
            {
                question: "Wie berechnet man die Arbeitslosenquote?",
                options: [
                    "(Arbeitslose / Gesamtbevölkerung) × 100%",
                    "(Arbeitslose / Erwerbspersonen) × 100%",
                    "(Arbeitslose / Erwerbstätige) × 100%",
                    "(Erwerbspersonen / Arbeitslose) × 100%"
                ],
                correct: 1,
                explanation: "Die Arbeitslosenquote wird berechnet als: (Anzahl Arbeitslose / Erwerbspersonen) × 100%. Erwerbspersonen = Erwerbstätige + Arbeitslose."
            },
            {
                question: "Welche Personen gehören NICHT zu den Erwerbspersonen?",
                options: [
                    "Teilzeitbeschäftigte",
                    "Arbeitslose, die aktiv Arbeit suchen",
                    "Rentner und Studenten",
                    "Selbstständige"
                ],
                correct: 2,
                explanation: "Rentner, Schüler und Studenten gehören nicht zu den Erwerbspersonen, da sie nicht aktiv dem Arbeitsmarkt zur Verfügung stehen. Erwerbspersonen umfassen nur Erwerbstätige und Arbeitslose."
            },
            {
                question: "Ein Land hat 45 Mio. Erwerbstätige und 2,5 Mio. Arbeitslose. Wie hoch ist die Arbeitslosenquote?",
                options: [
                    "5,26%",
                    "5,56%",
                    "2,50%",
                    "18,00%"
                ],
                correct: 0,
                explanation: "Erwerbspersonen = 45 + 2,5 = 47,5 Mio. → Arbeitslosenquote = (2,5 / 47,5) × 100% = 5,26%"
            },
            {
                question: "Maria hat ihr Studium beendet und sucht seit 6 Wochen nach ihrer ersten Stelle. Welche Art von Arbeitslosigkeit liegt vor?",
                options: [
                    "Strukturelle Arbeitslosigkeit",
                    "Konjunkturelle Arbeitslosigkeit",
                    "Friktionelle Arbeitslosigkeit",
                    "Saisonale Arbeitslosigkeit"
                ],
                correct: 2,
                explanation: "Dies ist friktionelle Arbeitslosigkeit (Sucharbeitslosigkeit). Sie entsteht durch normale Jobsuche nach Studium/Ausbildung oder beim Jobwechsel und dauert typischerweise nur wenige Wochen bis Monate."
            },
            {
                question: "Ein Kassierer verliert seinen Job durch Self-Checkout-Automaten. Seine Qualifikation wird nicht mehr benötigt. Welche Art von Arbeitslosigkeit ist das?",
                options: [
                    "Friktionelle Arbeitslosigkeit",
                    "Strukturelle Arbeitslosigkeit",
                    "Konjunkturelle Arbeitslosigkeit",
                    "Freiwillige Arbeitslosigkeit"
                ],
                correct: 1,
                explanation: "Dies ist strukturelle Arbeitslosigkeit, verursacht durch technologischen Wandel (Automatisierung). Die Qualifikation wird dauerhaft überflüssig. Lösung: Umschulung und Weiterbildung."
            },
            {
                question: "Während der Corona-Krise 2020 wurden viele Hotelmitarbeiter entlassen. Als sich die Wirtschaft 2021/22 erholte, wurden sie wieder eingestellt. Welche Art von Arbeitslosigkeit war das?",
                options: [
                    "Strukturelle Arbeitslosigkeit",
                    "Friktionelle Arbeitslosigkeit",
                    "Konjunkturelle Arbeitslosigkeit",
                    "Technologische Arbeitslosigkeit"
                ],
                correct: 2,
                explanation: "Dies ist konjunkturelle Arbeitslosigkeit. Sie entsteht durch Wirtschaftsabschwung oder Rezession und ist mittelfristig. Wenn sich die Konjunktur erholt, sinkt diese Art der Arbeitslosigkeit wieder."
            },
            {
                question: "Welche Aussage zur friktionellen Arbeitslosigkeit ist FALSCH?",
                options: [
                    "Sie dauert in der Regel nur wenige Wochen bis Monate",
                    "Sie entsteht durch normale Jobsuche und -wechsel",
                    "Sie kann durch bessere Jobbörsen reduziert werden",
                    "Sie ist die gefährlichste Form der Arbeitslosigkeit"
                ],
                correct: 3,
                explanation: "Friktionelle Arbeitslosigkeit ist die am wenigsten problematische Form, da sie kurz ist und meist freiwillig erfolgt. Gefährlicher sind strukturelle (langfristig) und konjunkturelle Arbeitslosigkeit."
            },
            {
                question: "Was besagt Okun's Gesetz?",
                options: [
                    "Höhere Bildung führt zu weniger Arbeitslosigkeit",
                    "Steigt die Arbeitslosigkeit um 1%, sinkt das BIP um etwa 2-3%",
                    "Arbeitslosigkeit und Inflation steigen immer zusammen",
                    "Höhere Löhne führen zu mehr Arbeitslosigkeit"
                ],
                correct: 1,
                explanation: "Okun's Gesetz (1962) besagt: Steigt die Arbeitslosigkeit um 1 Prozentpunkt, sinkt das BIP um etwa 2-3%. Dies zeigt die massiven volkswirtschaftlichen Kosten von Arbeitslosigkeit."
            },
            {
                question: "Was ist der Hauptunterschied zwischen aktiver und passiver Arbeitsmarktpolitik?",
                options: [
                    "Aktiv = staatliche Maßnahmen, Passiv = private Initiativen",
                    "Aktiv = Förderung & Qualifizierung, Passiv = finanzielle Absicherung",
                    "Aktiv = kurzfristig, Passiv = langfristig",
                    "Aktiv = für Jugendliche, Passiv = für Ältere"
                ],
                correct: 1,
                explanation: "Aktive Arbeitsmarktpolitik fördert Integration durch Weiterbildung, Vermittlung und Qualifizierung. Passive Politik sichert finanziell ab (ALG I, Bürgergeld) ohne die Ursachen zu beheben."
            },
            {
                question: "Welche Leistung gehört zur PASSIVEN Arbeitsmarktpolitik?",
                options: [
                    "Umschulung zum IT-Spezialisten",
                    "Arbeitslosengeld I",
                    "Arbeitsvermittlung durch Jobcenter",
                    "Existenzgründungsförderung"
                ],
                correct: 1,
                explanation: "Arbeitslosengeld I ist passive Arbeitsmarktpolitik (finanzielle Absicherung). Umschulung, Vermittlung und Gründungsförderung sind aktive Maßnahmen."
            },
            {
                question: "Wie funktioniert Kurzarbeitergeld?",
                options: [
                    "Unternehmen zahlen Arbeitslosen Geld für Weiterbildung",
                    "Staat zahlt 60-67% des Lohnausfalls bei reduzierter Arbeitszeit",
                    "Arbeitslose bekommen Zuschüsse für Bewerbungen",
                    "Unternehmen erhalten Geld für Neueinstellungen"
                ],
                correct: 1,
                explanation: "Bei Kurzarbeit reduziert das Unternehmen die Arbeitszeit (statt zu entlassen), und der Staat zahlt 60-67% des Lohnausfalls. So bleiben Mitarbeiter im Unternehmen und Know-how bleibt erhalten."
            },
            {
                question: "Welche Maßnahme hilft primär gegen STRUKTURELLE Arbeitslosigkeit?",
                options: [
                    "Konjunkturpakete für Infrastruktur",
                    "Bessere Online-Jobbörsen",
                    "Umschulung und Weiterbildung",
                    "Kurzarbeitergeld"
                ],
                correct: 2,
                explanation: "Strukturelle Arbeitslosigkeit entsteht durch dauerhaften Wandel (z.B. Technologie). Lösung: Umschulung und Weiterbildung, um neue Qualifikationen zu erwerben. Konjunkturpakete helfen gegen konjunkturelle Arbeitslosigkeit."
            },
            {
                question: "Ein Textilarbeiter verliert seinen Job, weil die Produktion nach China verlagert wird. Was liegt vor?",
                options: [
                    "Friktionelle Arbeitslosigkeit durch Jobwechsel",
                    "Konjunkturelle Arbeitslosigkeit durch Rezession",
                    "Strukturelle Arbeitslosigkeit durch Globalisierung",
                    "Saisonale Arbeitslosigkeit"
                ],
                correct: 2,
                explanation: "Dies ist strukturelle Arbeitslosigkeit durch Globalisierung. Die Produktionsverlagerung ins Ausland ist eine dauerhafte strukturelle Veränderung, die neue Qualifikationen oder Branchenwechsel erfordert."
            },
            {
                question: "Welche Folge von Arbeitslosigkeit ist KEINE gesamtwirtschaftliche Folge?",
                options: [
                    "Produktionsverlust durch ungenutztes Potenzial",
                    "Höhere Sozialausgaben des Staates",
                    "Verlust von individuellen Qualifikationen",
                    "Geringere Steuereinnahmen"
                ],
                correct: 2,
                explanation: "Der Verlust von Qualifikationen ist eine individuelle Folge (betrifft die einzelne Person). Gesamtwirtschaftliche Folgen sind: Produktionsverlust, höhere Sozialausgaben, geringere Steuereinnahmen und politische Instabilität."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            document.getElementById('questionArea').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const questionArea = document.getElementById('questionArea');
            const isRetry = wrongSet.has(qIdx);
            const letters = ['A', 'B', 'C', 'D'];

            let optionsHTML = '';
            q.options.forEach((option, i) => {
                optionsHTML += `
                    <div class="option" onclick="selectOption(${qIdx}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <span>${option}</span>
                    </div>
                `;
            });

            questionArea.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHTML}</div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                </div>
            `;

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = true;
            nextBtn.textContent = 'Weiter →';
            document.getElementById('prevBtn').style.display = 'none';
            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const options = document.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function previousQuestion() {}

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('resultsContainer').classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctAnswers').textContent = quizData.length;
            document.getElementById('incorrectAnswers').textContent = totalAnswered - quizData.length;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
