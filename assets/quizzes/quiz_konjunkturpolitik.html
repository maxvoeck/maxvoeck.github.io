<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Antizyklische Konjunkturpolitik</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
        }
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
padding: 20px;
display: flex;
justify-content: center;
align-items: center;
        }
.quiz-container {
background: white;
border-radius: 16px;
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
max-width: 800px;
width: 100%;
overflow: hidden;
        }
.quiz-header {
background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
color: white;
padding: 2rem;
text-align: center;
        }
.quiz-header h1 {
font-size: 1.8rem;
margin-bottom: 0.5rem;
        }
.quiz-header p {
opacity: 0.9;
font-size: 1rem;
        }
.progress-bar {
background: #e0e0e0;
height: 8px;
position: relative;
        }
.progress-fill {
background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
height: 100%;
width: 0%;
transition: width 0.3s ease;
        }
.quiz-content {
padding: 2rem;
        }
.question-container {
display: none;
        }
.question-container.active {
display: block;
animation: fadeIn 0.5s ease;
        }
@keyframes fadeIn {
            from {
opacity: 0;
transform: translateY(20px);
            }
            to {
opacity: 1;
transform: translateY(0);
            }
        }
.question-number {
color: #667eea;
font-weight: 600;
font-size: 0.9rem;
margin-bottom: 0.5rem;
        }
.question-text {
font-size: 1.3rem;
font-weight: 600;
color: #1f2937;
margin-bottom: 1.5rem;
line-height: 1.5;
        }
.options {
display: flex;
flex-direction: column;
gap: 1rem;
        }
.option {
background: #f8f9fa;
border: 2px solid #e0e0e0;
border-radius: 12px;
padding: 1rem 1.5rem;
cursor: pointer;
transition: all 0.3s ease;
display: flex;
align-items: center;
gap: 1rem;
        }
.option:hover {
background: #f0f1f3;
border-color: #667eea;
transform: translateX(5px);
        }
.option-letter {
background: #667eea;
color: white;
width: 32px;
height: 32px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-weight: 600;
flex-shrink: 0;
        }
.option.selected {
background: #e8eaf6;
border-color: #667eea;
        }
.option.correct {
background: #d4edda;
border-color: #28a745;
        }
.option.correct .option-letter {
background: #28a745;
        }
.option.incorrect {
background: #f8d7da;
border-color: #dc3545;
        }
.option.incorrect .option-letter {
background: #dc3545;
        }
.option.disabled {
cursor: not-allowed;
opacity: 0.7;
        }
.feedback {
margin-top: 1.5rem;
padding: 1rem;
border-radius: 8px;
display: none;
        }
.feedback.show {
display: block;
animation: fadeIn 0.5s ease;
        }
.feedback.correct {
background: #d4edda;
border-left: 4px solid #28a745;
color: #155724;
        }
.feedback.incorrect {
background: #f8d7da;
border-left: 4px solid #dc3545;
color: #721c24;
        }
.feedback-title {
font-weight: 600;
margin-bottom: 0.5rem;
        }
.controls {
margin-top: 2rem;
display: flex;
justify-content: space-between;
gap: 1rem;
        }
.btn {
padding: 0.8rem 2rem;
border: none;
border-radius: 8px;
font-size: 1rem;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
        }
.btn-primary {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
        }
.btn-primary:hover:not(:disabled) {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
.btn-secondary {
background: #f8f9fa;
color: #374151;
border: 2px solid #e0e0e0;
        }
.btn-secondary:hover:not(:disabled) {
background: #e9ecef;
        }
.btn:disabled {
opacity: 0.5;
cursor: not-allowed;
        }
.results-container {
display: none;
text-align: center;
padding: 2rem;
        }
.results-container.show {
display: block;
animation: fadeIn 0.5s ease;
        }
.score-circle {
width: 200px;
height: 200px;
border-radius: 50%;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
margin: 2rem auto;
color: white;
box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
.score-number {
font-size: 3rem;
font-weight: 700;
        }
.score-label {
font-size: 1rem;
opacity: 0.9;
        }
.result-message {
font-size: 1.5rem;
font-weight: 600;
color: #1f2937;
margin-bottom: 1rem;
        }
.result-details {
background: #f8f9fa;
border-radius: 12px;
padding: 1.5rem;
margin: 2rem 0;
display: flex;
justify-content: space-around;
flex-wrap: wrap;
gap: 1rem;
        }
.result-stat {
text-align: center;
        }
.result-stat-number {
font-size: 2rem;
font-weight: 700;
color: #667eea;
        }
.result-stat-label {
font-size: 0.9rem;
color: #666;
margin-top: 0.3rem;
        }
@media (max-width: 768px) {
body {
padding: 10px;
            }
.quiz-header h1 {
font-size: 1.4rem;
            }
.question-text {
font-size: 1.1rem;
            }
.controls {
flex-direction: column;
            }
.btn {
width: 100%;
            }
        }
</style>
</head>
<body>
<div class="quiz-container">
<div class="quiz-header">
<h1>🌡️ Antizyklische Konjunkturpolitik</h1>
<p>Fiskal- & Geldpolitik zur Wirtschaftsstabilisierung</p>
</div>
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
<div class="quiz-content">
<div id="questionsContainer"></div>
<div class="results-container" id="resultsContainer">
<div class="result-message" id="resultMessage"></div>
<div class="score-circle">
<div class="score-number" id="scoreNumber">0%</div>
<div class="score-label">Erreicht</div>
</div>
<div class="result-details">
<div class="result-stat">
<div class="result-stat-number" id="correctCount">0</div>
<div class="result-stat-label">Richtig</div>
</div>
<div class="result-stat">
<div class="result-stat-number" id="incorrectCount">0</div>
<div class="result-stat-label">Falsch</div>
</div>
<div class="result-stat">
<div class="result-stat-number" id="totalCount">0</div>
<div class="result-stat-label">Gesamt</div>
</div>
</div>
<button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
</div>
</div>
</div>
<script>
const quizData = [
            {
question: "Was bedeutet 'antizyklische' Konjunkturpolitik?",
options: [
"Der Staat handelt im Einklang mit dem Konjunkturzyklus",
"Der Staat handelt gegen den Konjunkturzyklus zur Stabilisierung",
"Der Staat mischt sich nicht in die Wirtschaft ein",
"Der Staat folgt immer den Marktgesetzen"
                ],
correct: 1,
explanation: "Antizyklisch bedeutet 'gegen den Zyklus'. Der Staat handelt bewusst entgegengesetzt zur aktuellen Konjunkturlage, um Schwankungen auszugleichen und die Wirtschaft zu stabilisieren."
            },
            {
question: "Was ist das Hauptziel antizyklischer Politik?",
options: [
"Maximierung der Staatseinnahmen",
"Ausgleich wirtschaftlicher Schwankungen und Stabilisierung",
"Erhöhung der Inflation",
"Privatisierung staatlicher Unternehmen"
                ],
correct: 1,
explanation: "Das Hauptziel ist die Stabilisierung der Konjunktur durch Ausgleich wirtschaftlicher Schwankungen. Damit sollen Wachstum, Beschäftigung und Preisstabilität gesichert werden."
            },
            {
question: "Wer prägte die Theorie der antizyklischen Politik maßgeblich?",
options: [
"Adam Smith",
"John Maynard Keynes",
"Karl Marx",
"Milton Friedman"
                ],
correct: 1,
explanation: "John Maynard Keynes (1883-1946) entwickelte die keynesianische Theorie. Er erkannte, dass Märkte sich nicht immer selbst stabilisieren und der Staat aktiv eingreifen muss, besonders in Krisen."
            },
            {
question: "Welche historische Krise führte zur Entwicklung der keynesianischen Theorie?",
options: [
"Ölkrise 1973",
"Große Depression der 1930er Jahre",
"Finanzkrise 2008",
"Corona-Krise 2020"
                ],
correct: 1,
explanation: "Die Weltwirtschaftskrise der 1930er Jahre mit Massenarbeitslosigkeit (USA: 25%, Deutschland: 30%) zeigte, dass Märkte sich nicht selbst regulieren. Dies führte zur keynesianischen Revolution."
            },
            {
question: "Was sind die beiden Hauptbereiche der Konjunkturpolitik?",
options: [
"Export- und Importpolitik",
"Fiskalpolitik und Geldpolitik",
"Arbeitsmarkt- und Sozialpolitik",
"Umwelt- und Energiepolitik"
                ],
correct: 1,
explanation: "Die beiden Hauptbereiche sind Fiskalpolitik (Staat steuert durch Einnahmen & Ausgaben) und Geldpolitik (Zentralbank steuert Geld & Zinsen). Beide arbeiten zusammen, aber mit unterschiedlichen Instrumenten."
            },
            {
question: "Welche Institution ist für die Geldpolitik in der Eurozone zuständig?",
options: [
"Die Bundesregierung",
"Die Europäische Zentralbank (EZB)",
"Die Europäische Kommission",
"Das Bundesfinanzministerium"
                ],
correct: 1,
explanation: "Die Europäische Zentralbank (EZB) ist für die Geldpolitik in der Eurozone zuständig und arbeitet unabhängig von den Regierungen der Mitgliedsstaaten."
            },
            {
question: "Welche drei Hauptinstrumente gehören zur Fiskalpolitik?",
options: [
"Leitzinsen, Geldmenge, Wechselkurse",
"Staatsausgaben, Steuerpolitik, Sozialleistungen",
"Export, Import, Zölle",
"Mindestlohn, Rente, Krankenversicherung"
                ],
correct: 1,
explanation: "Die drei Hauptinstrumente der Fiskalpolitik sind: Staatsausgaben (Infrastruktur, Schulen), Steuerpolitik (Einkommensteuer, MwSt.) und Sozialleistungen (Arbeitslosengeld, Kurzarbeitergeld)."
            },
            {
question: "Welche drei Hauptinstrumente gehören zur Geldpolitik?",
options: [
"Steuern, Ausgaben, Schulden",
"Leitzinsen, Geldmenge, Offenmarktgeschäfte",
"Subventionen, Transfers, Investitionen",
"Export, Import, Handelsbilanz"
                ],
correct: 1,
explanation: "Die drei Hauptinstrumente der Geldpolitik sind: Leitzinsen (Zinssatz für Banken), Geldmenge (wie viel Geld im Umlauf ist) und Offenmarktgeschäfte (An-/Verkauf von Wertpapieren)."
            },
            {
question: "Was macht der Staat in einer Rezession (expansive Politik)?",
options: [
"Steuern erhöhen und Ausgaben kürzen",
"Steuern senken und Staatsausgaben erhöhen",
"Nichts tun und Märkte selbst regulieren lassen",
"Nur die Geldmenge reduzieren"
                ],
correct: 1,
explanation: "In der Rezession betreibt der Staat expansive Fiskalpolitik: Steuern senken (mehr Kaufkraft), Staatsausgaben erhöhen (mehr Aufträge) und Konjunkturpakete schnüren (direkte Investitionen)."
            },
            {
question: "Was macht die Zentralbank in einer Rezession?",
options: [
"Zinsen erhöhen und Geldmenge reduzieren",
"Zinsen senken und Geldmenge erhöhen",
"Nur Steuern senken",
"Staatsausgaben erhöhen"
                ],
correct: 1,
explanation: "Die Zentralbank betreibt expansive Geldpolitik: Zinsen senken (Kredite billiger), Geldmenge erhöhen (mehr Liquidität) und Anleihen kaufen (Banken erhalten mehr Geld)."
            },
            {
question: "Was ist die Wirkungskette expansiver Politik?",
options: [
"Staat spart → Wirtschaft schrumpft → Arbeitslosigkeit steigt",
"Staat gibt mehr aus → Unternehmen erhalten Aufträge → Beschäftigung steigt → Mehr Konsum",
"Staat erhöht Steuern → Nachfrage sinkt → Rezession",
"Zentralbank erhöht Zinsen → Kredite teurer → Investitionen sinken"
                ],
correct: 1,
explanation: "Die Wirkungskette: Staat gibt mehr aus → Unternehmen erhalten Aufträge → Beschäftigung steigt → Einkommen steigen → Mehr Konsum & Nachfrage → Wirtschaft wächst."
            },
            {
question: "Welche Herausforderung gibt es bei Rezessionsmaßnahmen?",
options: [
"Zu schnelle Wirkung",
"Zeitverzögerung, Finanzierbarkeit, politische Durchsetzbarkeit",
"Zu viele Steuereinnahmen",
"Sinkende Arbeitslosigkeit"
                ],
correct: 1,
explanation: "Drei kritische Faktoren: Zeitverzögerung (von Entscheidung bis Wirkung vergehen Monate), Finanzierbarkeit (mehr Ausgaben = mehr Schulden) und politische Durchsetzbarkeit (Opposition, Schuldenbremse, föderale Strukturen)."
            },
            {
question: "Was macht der Staat im Boom (restriktive Politik)?",
options: [
"Steuern senken und mehr ausgeben",
"Steuern erhöhen, Ausgaben kürzen, Schulden abbauen",
"Zinsen senken und Geldmenge erhöhen",
"Konjunkturpakete schnüren"
                ],
correct: 1,
explanation: "Im Boom betreibt der Staat restriktive Fiskalpolitik: Steuern erhöhen (weniger Kaufkraft), Staatsausgaben kürzen (Nachfrage dämpfen) und Schulden abbauen (Reserven für nächste Krise schaffen)."
            },
            {
question: "Was macht die Zentralbank im Boom?",
options: [
"Zinsen senken und Anleihen kaufen",
"Zinsen erhöhen und Geldmenge reduzieren",
"Steuern erhöhen",
"Staatsausgaben kürzen"
                ],
correct: 1,
explanation: "Die Zentralbank betreibt restriktive Geldpolitik: Zinsen erhöhen (Kredite teurer), Geldmenge reduzieren (weniger Liquidität) und Anleihen verkaufen (Geld aus dem Markt nehmen)."
            },
            {
question: "Warum ist Bremsen im Boom wichtig?",
options: [
"Um Arbeitslosigkeit zu erhöhen",
"Um Überhitzung, Inflation und Instabilität zu vermeiden",
"Um den Export zu reduzieren",
"Um mehr Schulden zu machen"
                ],
correct: 1,
explanation: "Drei wichtige Ziele: Vermeidung von Überhitzung (zu schnelles Wachstum führt zu Instabilität), Inflationskontrolle (Preise steigen sonst zu stark) und Aufbau von Reserven (im Boom Schulden abbauen für nächste Krise)."
            },
            {
question: "Was war die Ausgangslage der Finanzkrise 2008?",
options: [
"Ölpreise stiegen stark",
"Zusammenbruch Lehman Brothers, globale Bankenkrise, Exporteinbruch",
"Inflation wurde zu hoch",
"Staatsverschuldung explodierte"
                ],
correct: 1,
explanation: "2008: Zusammenbruch der Investmentbank Lehman Brothers, globale Bankenkrise (Kreditvergabe stoppt), Einbruch des Exports (besonders Deutschland betroffen) und drohende Massenarbeitslosigkeit."
            },
            {
question: "Welche drei Hauptmaßnahmen ergriff Deutschland 2008-2009?",
options: [
"Steuern erhöhen, sparen, Zinsen erhöhen",
"Konjunkturpakete (80 Mrd. €), Abwrackprämie, Kurzarbeitergeld",
"Nur die Banken verstaatlichen",
"Nichts tun und abwarten"
                ],
correct: 1,
explanation: "Deutschland reagierte mit: 1) Konjunkturpakete I & II (ca. 80 Mrd. € für Infrastruktur, Bildung), 2) Abwrackprämie (2.500 € beim Neuwagenkauf) und 3) Kurzarbeitergeld (Staat zahlte Lohnausfall → Entlassungen verhindert)."
            },
            {
question: "Was war das Ergebnis der deutschen Maßnahmen 2008-2009?",
options: [
"Totales Scheitern und Massenarbeitslosigkeit",
"BIP 2009: -5,7%, aber schnelle V-förmige Erholung 2010",
"Keine Wirkung erkennbar",
"Depression über 10 Jahre"
                ],
correct: 1,
explanation: "Ergebnis: BIP 2009: -5,7% (schmerzhaft, aber glimpflich), 2010: schnelle V-förmige Erholung, Arbeitslosigkeit stieg nur moderat, Deutschland wurde zum 'Stabilitätsanker' in Europa. Aber: Staatsverschuldung stieg stark."
            },
            {
question: "Was ist ein Problem bei der Erkennung der Konjunkturphase?",
options: [
"Daten sind immer perfekt aktuell",
"Daten sind verzögert und widersprüchlich",
"Es gibt keine Daten",
"Nur die EZB hat Daten"
                ],
correct: 1,
explanation: "Ein großes Hindernis: Wo stehen wir genau? Wirtschaftsdaten sind verzögert (erscheinen Wochen/Monate später) und oft widersprüchlich (verschiedene Indikatoren zeigen unterschiedliche Signale)."
            },
            {
question: "Was versteht man unter 'recognition lag' und 'decision lag'?",
options: [
"Verzögerungen bei der Datenerkennung und Entscheidungsfindung",
"Schnelle Reaktionszeiten",
"Nur technische Probleme",
"Fehler bei der Datenerfassung"
                ],
correct: 0,
explanation: "Recognition lag = Zeit bis Problem erkannt wird (Daten sind verzögert), Decision lag = Zeit bis politische Entscheidung getroffen wird (Gesetzgebung dauert Monate). Von Beschluss bis Effekt: 6-18 Monate."
            },
            {
question: "Was ist das 'Asymmetrie-Problem' der Konjunkturpolitik?",
options: [
"Expansion ist populär, Restriktion ist unpopulär",
"Alle Maßnahmen sind gleich beliebt",
"Nur Geldpolitik funktioniert",
"Nur Fiskalpolitik funktioniert"
                ],
correct: 0,
explanation: "In der Rezession: Steuern senken & Geld ausgeben → Wähler freuen sich. Im Boom: Steuern erhöhen & sparen → Wähler verärgert. Politiker meiden daher oft unpopuläre, aber notwendige restriktive Maßnahmen."
            },
            {
question: "Ordne zu: 'EZB erhöht Leitzins auf 4%'",
options: [
"Expansive Fiskalpolitik",
"Restriktive Geldpolitik",
"Expansive Geldpolitik",
"Restriktive Fiskalpolitik"
                ],
correct: 1,
explanation: "Die EZB (Zentralbank) erhöht Zinsen → Kredite werden teurer → Geldpolitik. Erhöhung = Bremsen = Restriktiv. Richtig: Restriktive Geldpolitik (typisch im Boom zur Inflationsbekämpfung)."
            },
            {
question: "Ordne zu: 'Deutschland plant 50 Mrd. € Infrastrukturpaket'",
options: [
"Expansive Fiskalpolitik",
"Restriktive Fiskalpolitik",
"Expansive Geldpolitik",
"Restriktive Geldpolitik"
                ],
correct: 0,
explanation: "Deutschland (Staat/Regierung) gibt mehr aus → Fiskalpolitik. Mehr Ausgaben = Ankurbeln = Expansiv. Richtig: Expansive Fiskalpolitik (typisch in Rezession zur Wirtschaftsankurbelung)."
            },
            {
question: "Ordne zu: 'Zentralbank verkauft Staatsanleihen'",
options: [
"Expansive Fiskalpolitik",
"Restriktive Geldpolitik",
"Expansive Geldpolitik",
"Restriktive Fiskalpolitik"
                ],
correct: 1,
explanation: "Zentralbank (EZB) verkauft Anleihen → Geld wird aus Markt genommen → Geldpolitik. Verkaufen = Bremsen = Restriktiv. Richtig: Restriktive Geldpolitik (Offenmarktgeschäft im Boom)."
            },
            {
question: "Warum ist die EZB unabhängig von Regierungen?",
options: [
"Damit sie keine Entscheidungen treffen muss",
"Um politische Einflussnahme auf Geldpolitik zu verhindern",
"Sie ist nicht unabhängig",
"Nur aus historischen Gründen"
                ],
correct: 1,
explanation: "Die Unabhängigkeit der EZB ist wichtig, damit Geldpolitik nicht von kurzfristigen politischen Interessen (z.B. Wahlzyklen) beeinflusst wird. So kann sie sich auf langfristige Preisstabilität konzentrieren."
            },
            {
question: "Was sagte Keynes mit 'In the long run we are all dead'?",
options: [
"Langfristige Planung ist unwichtig",
"Man muss kurzfristig handeln, statt auf Selbstregulierung zu warten",
"Wirtschaftspolitik ist sinnlos",
"Nur langfristige Politik zählt"
                ],
correct: 1,
explanation: "Keynes kritisierte damit die klassische Lehre, die sagte 'langfristig regulieren sich Märkte selbst'. Seine Botschaft: Wenn wir nicht kurzfristig in Krisen eingreifen, leiden Menschen unnötig – wir können nicht auf langfristige Selbstregulierung warten."
            }
        ];
let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
</script>
</body>
</html>
