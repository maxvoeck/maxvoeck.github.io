            },
            {

"Wohnen & Energie (~32%)",
"Freizeit & Kultur (~11%)"
                ],

            },
            {
question: "Welches Problem hat der Verbraucherpreisindex (VPI) bei der Inflationsmessung?",
options: [
"Er ist zu genau und überfordert die Statistiker",
"Er berücksichtigt den Substitutionseffekt nicht — Konsumenten weichen auf billigere Güter aus",
"Er wird nur alle 10 Jahre aktualisiert",
"Er enthält nur Lebensmittel"
                ],
correct: 1,
explanation: "Der VPI hat mehrere Grenzen: das Durchschnittsproblem, Qualitätsveränderungen, neue Güter (z.B. Smartphones 2005) und den Substitutionseffekt. Deshalb überschätzt der VPI tendenziell die Inflation leicht."
            },
            {
question: "Welche drei Arten von Inflation gibt es?",

"Leichte, mittlere und schwere Inflation",

"Steuersenkung, Lohnerhöhung und Zinssenkung",
"Private, staatliche und internationale Inflation"
                ],
correct: 1,
explanation: "Die drei Inflationsarten sind: Nachfrageinflation (Demand-Pull: zu viel Geld), Angebotsinflation (Cost-Push: Kosten steigen) und Importierte Inflation (von außen). In der Realität wirken oft mehrere Ursachen gleichzeitig."
            },
            {
question: "Was ist Nachfrageinflation (Demand-Pull)?",
options: [
"Inflation durch steigende Produktionskosten",
"Inflation, weil die gesamtwirtschaftliche Nachfrage das Angebot übersteigt",
"Inflation durch steigende Weltmarktpreise",
"Inflation durch sinkende Löhne"
                ],
correct: 1,
explanation: "Bei Nachfrageinflation übersteigt die gesamtwirtschaftliche Nachfrage das Angebot. Zu viel Geld 'jagt' zu wenige Güter. Dies ist typisch in Boom-Phasen und häufig nach starker Geldmengenausweitung. Merkformel: Zu viel Geld → Preise steigen."
            },
            {
question: "Welches Beispiel zeigt Nachfrageinflation in Deutschland 2021/22?",
options: [
"Steigende Ölpreise durch den Ukraine-Krieg",
"Nach Corona-Lockdowns explodierte die Konsumnachfrage, das Angebot konnte nicht schnell genug skalieren",
"Abwertung des Euro gegenüber dem Dollar",
"Erhöhung der Mehrwertsteuer"
                ],
correct: 1,
explanation: "Nach den Corona-Lockdowns explodierte die Konsumnachfrage. Staatliche Hilfen hatten die Kaufkraft erhalten, aber das Angebot konnte nicht schnell genug skalieren. Unternehmen erhöhten die Preise, da die Nachfrage jedes Angebot aufnahm."
            },
            {
question: "Was ist Angebotsinflation (Cost-Push)?",
options: [
"Inflation durch zu hohe Nachfrage",
"Inflation durch steigende Produktionskosten, die Unternehmen weitergeben",
"Inflation durch Wechselkursänderungen",
"Inflation durch Steuersenkungen"
                ],
correct: 1,

            {
question: "Welches historische Beispiel zeigt Angebotsinflation?",

"Nur große Konzerne"
                ],
correct: 1,

correct: 1,

            },

            },
            {
question: "Was ist das wichtigste Instrument der EZB?",

                ],

let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
</script>
</body>
</html>
