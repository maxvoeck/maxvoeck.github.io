<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Vektorprodukt & Spatprodukt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        /* Vektordarstellung mit Pfeil darüber */
        .vector {
            position: relative;
            display: inline-block;
            font-style: italic;
        }
        .vector::after {
            content: '→';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: -0.6em;
            font-size: 0.8em;
            font-style: normal;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📐 Vektorprodukt & Spatprodukt</h1>
            <p>Teste dein Wissen über Kreuzprodukt und geometrische Anwendungen</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <!-- Questions will be inserted here -->
            <div id="questionsContainer"></div>

            <!-- Results -->
            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        // Hilfsfunktion zur Formatierung von Vektoren
        function formatMath(text) {
            // Ersetze Vektorsymbole mit Pfeil darüber
            return text
                .replace(/([abc])⃗/g, '<span class="vector">$1</span>')
                .replace(/AB⃗/g, '<span style="position:relative;"><span style="position:absolute;top:-0.6em;left:50%;transform:translateX(-50%);font-size:0.8em;">→</span>AB</span>')
                .replace(/OA⃗/g, '<span style="position:relative;"><span style="position:absolute;top:-0.6em;left:50%;transform:translateX(-50%);font-size:0.8em;">→</span>OA</span>')
                .replace(/OB⃗/g, '<span style="position:relative;"><span style="position:absolute;top:-0.6em;left:50%;transform:translateX(-50%);font-size:0.8em;">→</span>OB</span>')
                .replace(/0⃗/g, '<span class="vector">0</span>')
                .replace(/ℝ³/g, 'ℝ<sup>3</sup>')
                .replace(/ℝ²/g, 'ℝ<sup>2</sup>');
        }

        const quizData = [
            {
                question: "Was ist das Grundprinzip des Vektorprodukts?",
                options: [
                    "Vektor × Vektor = Skalar",
                    "Vektor × Vektor = Vektor",
                    "Skalar × Vektor = Vektor",
                    "Vektor × Skalar = Skalar"
                ],
                correct: 1,
                explanation: "Das Vektorprodukt (Kreuzprodukt) multipliziert zwei Vektoren und liefert einen neuen Vektor. Im Gegensatz zum Skalarprodukt, das eine Zahl liefert, ist das Ergebnis des Vektorprodukts wieder ein Vektor."
            },
            {
                question: "In welchem Raum ist das Vektorprodukt definiert?",
                options: [
                    "In allen Vektorräumen",
                    "Nur im ℝ²",
                    "Nur im ℝ³",
                    "In ℝ² und ℝ³"
                ],
                correct: 2,
                explanation: "Das Vektorprodukt ist eine besondere Operation, die nur im dreidimensionalen Raum ℝ³ definiert ist. In anderen Dimensionen existiert diese Operation nicht in dieser Form."
            },
            {
                question: "Welche geometrische Eigenschaft hat das Vektorprodukt a⃗ × b⃗?",
                options: [
                    "Es ist parallel zu a⃗",
                    "Es ist parallel zu b⃗",
                    "Es steht senkrecht auf beiden Vektoren a⃗ und b⃗",
                    "Es liegt zwischen a⃗ und b⃗"
                ],
                correct: 2,
                explanation: "Das Vektorprodukt a⃗ × b⃗ steht immer senkrecht (orthogonal) auf beiden Ausgangsvektoren. Diese Orthogonalität ist eine fundamentale Eigenschaft des Kreuzprodukts."
            },
            {
                question: "Was bedeutet es, wenn a⃗ × b⃗ = 0⃗?",
                options: [
                    "Die Vektoren sind orthogonal",
                    "Die Vektoren sind parallel oder einer ist der Nullvektor",
                    "Die Vektoren haben gleiche Länge",
                    "Die Vektoren sind Einheitsvektoren"
                ],
                correct: 1,
                explanation: "Wenn das Vektorprodukt den Nullvektor ergibt, sind die beiden Vektoren parallel (kollinear) oder mindestens einer der Vektoren ist der Nullvektor. Dies ist das Parallelitätskriterium."
            },
            {
                question: "Ist das Vektorprodukt kommutativ?",
                options: [
                    "Ja, a⃗ × b⃗ = b⃗ × a⃗",
                    "Nein, a⃗ × b⃗ = -(b⃗ × a⃗)",
                    "Nur für orthogonale Vektoren",
                    "Nur für parallele Vektoren"
                ],
                correct: 1,
                explanation: "Das Vektorprodukt ist NICHT kommutativ! Bei Vertauschung der Faktoren ändert sich das Vorzeichen: a⃗ × b⃗ = -(b⃗ × a⃗). Dies ändert die Richtung des Ergebnisvektors."
            },
            {
                question: "Was berechnet man mit |a⃗ × b⃗|?",
                options: [
                    "Den Winkel zwischen den Vektoren",
                    "Die Summe der Beträge",
                    "Den Flächeninhalt des aufgespannten Parallelogramms",
                    "Das Volumen des Spats"
                ],
                correct: 2,
                explanation: "Der Betrag |a⃗ × b⃗| entspricht dem Flächeninhalt des Parallelogramms, das von den Vektoren a⃗ und b⃗ aufgespannt wird. Dies ist eine fundamentale geometrische Bedeutung."
            },
            {
                question: "Wie berechnet man den Flächeninhalt eines Dreiecks mit Vektoren a⃗ und b⃗?",
                options: [
                    "A = |a⃗ × b⃗|",
                    "A = (1/2)|a⃗ × b⃗|",
                    "A = 2|a⃗ × b⃗|",
                    "A = |a⃗| · |b⃗|"
                ],
                correct: 1,
                explanation: "Ein Dreieck hat den halben Flächeninhalt des entsprechenden Parallelogramms. Daher: A_Dreieck = (1/2)|a⃗ × b⃗|."
            },
            {
                question: "Was ist das Spatprodukt [a⃗, b⃗, c⃗]?",
                options: [
                    "a⃗ × (b⃗ × c⃗)",
                    "a⃗ · (b⃗ × c⃗)",
                    "(a⃗ × b⃗) × c⃗",
                    "(a⃗ · b⃗) · c⃗"
                ],
                correct: 1,
                explanation: "Das Spatprodukt (gemischtes Produkt) ist definiert als [a⃗, b⃗, c⃗] = a⃗ · (b⃗ × c⃗). Es kombiniert Vektor- und Skalarprodukt und liefert eine Zahl."
            },
            {
                question: "Was ist das Ergebnis des Spatprodukts?",
                options: [
                    "Ein Vektor",
                    "Eine Zahl (Skalar)",
                    "Eine Matrix",
                    "Ein Punkt"
                ],
                correct: 1,
                explanation: "Das Spatprodukt [a⃗, b⃗, c⃗] = a⃗ · (b⃗ × c⃗) ist eine Zahl (Skalar). Man berechnet erst das Kreuzprodukt (gibt einen Vektor) und dann das Skalarprodukt (gibt eine Zahl)."
            },
            {
                question: "Was bedeutet es, wenn [a⃗, b⃗, c⃗] = 0?",
                options: [
                    "Die Vektoren sind alle parallel",
                    "Die Vektoren sind komplanar (liegen in einer Ebene)",
                    "Die Vektoren sind orthogonal",
                    "Die Vektoren haben gleiche Länge"
                ],
                correct: 1,
                explanation: "Wenn das Spatprodukt null ist, sind die drei Vektoren komplanar, d.h. sie liegen alle in einer gemeinsamen Ebene. Dies ist das Komplanaritätskriterium."
            },
            {
                question: "Wie berechnet man das Volumen eines Spats (Parallelepipeds)?",
                options: [
                    "V = [a⃗, b⃗, c⃗]",
                    "V = |[a⃗, b⃗, c⃗]|",
                    "V = (1/2)|[a⃗, b⃗, c⃗]|",
                    "V = (1/3)|[a⃗, b⃗, c⃗]|"
                ],
                correct: 1,
                explanation: "Das Volumen eines Spats (vierseitiges schiefes Prisma) beträgt V = |[a⃗, b⃗, c⃗]|. Man nimmt den Betrag, da das Volumen positiv sein muss."
            },
            {
                question: "Wie lautet die Volumenformel für eine vierseitige Pyramide?",
                options: [
                    "V = |[a⃗, b⃗, c⃗]|",
                    "V = (1/2)|[a⃗, b⃗, c⃗]|",
                    "V = (1/3)|[a⃗, b⃗, c⃗]|",
                    "V = (1/6)|[a⃗, b⃗, c⃗]|"
                ],
                correct: 2,
                explanation: "Eine vierseitige Pyramide hat ein Drittel des Volumens des entsprechenden Spats: V = (1/3)|[a⃗, b⃗, c⃗]|. Dies ist die allgemeine Pyramidenformel V = (1/3) · Grundfläche · Höhe."
            },
            {
                question: "Wie berechnet man das Volumen eines Tetraeders (dreiseitige Pyramide)?",
                options: [
                    "V = |[a⃗, b⃗, c⃗]|",
                    "V = (1/2)|[a⃗, b⃗, c⃗]|",
                    "V = (1/3)|[a⃗, b⃗, c⃗]|",
                    "V = (1/6)|[a⃗, b⃗, c⃗]|"
                ],
                correct: 3,
                explanation: "Ein Tetraeder (dreiseitige Pyramide) kombiniert die Faktoren 1/2 (für die dreieckige Grundfläche) und 1/3 (für die Pyramide): V = (1/6)|[a⃗, b⃗, c⃗]|."
            },
            {
                question: "Welche Eigenschaft gilt für die zyklische Vertauschung beim Spatprodukt?",
                options: [
                    "[a⃗, b⃗, c⃗] ≠ [b⃗, c⃗, a⃗]",
                    "[a⃗, b⃗, c⃗] = [b⃗, c⃗, a⃗] = [c⃗, a⃗, b⃗]",
                    "[a⃗, b⃗, c⃗] = -[b⃗, c⃗, a⃗]",
                    "[a⃗, b⃗, c⃗] = 0"
                ],
                correct: 1,
                explanation: "Bei zyklischer Vertauschung bleibt das Spatprodukt gleich: [a⃗, b⃗, c⃗] = [b⃗, c⃗, a⃗] = [c⃗, a⃗, b⃗]. Nur bei nicht-zyklischer Vertauschung ändert sich das Vorzeichen."
            },
            {
                question: "Wie berechnet man den Verbindungsvektor von Punkt A nach Punkt B?",
                options: [
                    "AB⃗ = OA⃗ + OB⃗",
                    "AB⃗ = OA⃗ - OB⃗",
                    "AB⃗ = OB⃗ - OA⃗",
                    "AB⃗ = |OB⃗ - OA⃗|"
                ],
                correct: 2,
                explanation: "Der Verbindungsvektor von A nach B wird berechnet mit: AB⃗ = OB⃗ - OA⃗. Merksatz: 'Spitze minus Schaft' - der Vektor zeigt vom ersten zum zweiten Punkt."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
