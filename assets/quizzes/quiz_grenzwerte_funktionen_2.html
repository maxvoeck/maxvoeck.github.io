<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Grenzwerte an einer Stelle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .math-formula {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.1em;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            display: inline-block;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📍 Grenzwerte an einer Stelle</h1>
            <p>Lücken, Polstellen und Sprungstellen</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionsContainer"></div>

            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Was bedeutet lim<sub>x→a</sub> f(x) = g?",
                options: [
                    "Die Funktion hat bei x = a den Wert g",
                    "f(x) nähert sich g an, wenn x gegen a geht",
                    "Die Ableitung der Funktion bei a ist g",
                    "Die Funktion ist bei x = a nicht definiert"
                ],
                correct: 1,
                explanation: "lim<sub>x→a</sub> f(x) = g bedeutet: Die Funktionswerte nähern sich g an, wenn sich x dem Wert a nähert – unabhängig davon, ob f(a) definiert ist oder nicht."
            },
            {
                question: "Wann existiert der Grenzwert lim<sub>x→a</sub> f(x)?",
                options: [
                    "Immer, wenn f(a) definiert ist",
                    "Nur wenn die Funktion bei a stetig ist",
                    "Nur wenn lim<sub>x→a⁻</sub> f(x) = lim<sub>x→a⁺</sub> f(x)",
                    "Nur wenn f(a) = 0"
                ],
                correct: 2,
                explanation: "Der Grenzwert existiert nur, wenn die einseitigen Grenzwerte von links (a⁻) und von rechts (a⁺) übereinstimmen und zum gleichen Wert führen."
            },
            {
                question: "Was ist eine hebbare Lücke?",
                options: [
                    "Eine Stelle, wo die Funktion gegen ±∞ geht",
                    "Eine Stelle, wo f(a) nicht definiert ist, aber der Grenzwert existiert",
                    "Eine Stelle, wo die Funktion springt",
                    "Eine Stelle mit senkrechter Asymptote"
                ],
                correct: 1,
                explanation: "Eine hebbare Lücke liegt vor, wenn f(a) nicht definiert ist, ABER der Grenzwert existiert. Man könnte die Funktion an dieser Stelle ergänzen, um sie stetig zu machen."
            },
            {
                question: "Berechne: lim<sub>x→3</sub> (x² - 9)/(x - 3)",
                options: [
                    "0",
                    "3",
                    "6",
                    "Der Grenzwert existiert nicht"
                ],
                correct: 2,
                explanation: "Faktorisiere: (x² - 9)/(x - 3) = (x-3)(x+3)/(x-3) = x+3 für x≠3. Dann: lim<sub>x→3</sub> (x+3) = 6. Dies ist eine hebbare Lücke."
            },
            {
                question: "Was ist eine Polstelle?",
                options: [
                    "Eine Stelle, wo f(a) = 0",
                    "Eine Stelle, wo die Funktion gegen ±∞ geht",
                    "Eine Stelle, wo die Funktion stetig ist",
                    "Eine Stelle, wo die Ableitung 0 ist"
                ],
                correct: 1,
                explanation: "Eine Polstelle liegt vor, wenn die Funktion an der Stelle x = a gegen +∞ oder -∞ geht. Die Gerade x = a ist dann eine senkrechte Asymptote."
            },
            {
                question: "Wie erkennt man bei f(x) = Z(x)/N(x) eine Polstelle bei x = a?",
                options: [
                    "Wenn Z(a) = 0 und N(a) = 0",
                    "Wenn Z(a) ≠ 0 und N(a) = 0",
                    "Wenn Z(a) = 0 und N(a) ≠ 0",
                    "Wenn Z(a) = N(a)"
                ],
                correct: 1,
                explanation: "Eine Polstelle liegt vor, wenn der Nenner N(a) = 0 ist, aber der Zähler Z(a) ≠ 0. Falls beide 0 sind, liegt eine hebbare Lücke vor."
            },
            {
                question: "Für f(x) = 1/(x-3): Was passiert bei x = 3?",
                options: [
                    "Hebbare Lücke",
                    "Polstelle mit lim<sub>x→3⁻</sub> = -∞ und lim<sub>x→3⁺</sub> = +∞",
                    "Sprungstelle",
                    "Die Funktion ist dort stetig"
                ],
                correct: 1,
                explanation: "Bei x = 3 liegt eine Polstelle vor. Von links (x < 3) ist x-3 negativ und klein → f(x) → -∞. Von rechts (x > 3) ist x-3 positiv und klein → f(x) → +∞."
            },
            {
                question: "Was ist eine Sprungstelle?",
                options: [
                    "Eine Stelle mit hebbarer Lücke",
                    "Eine Stelle, wo lim<sub>x→a⁻</sub> f(x) ≠ lim<sub>x→a⁺</sub> f(x)",
                    "Eine Stelle mit Polstelle",
                    "Eine Stelle, wo f'(a) nicht existiert"
                ],
                correct: 1,
                explanation: "Eine Sprungstelle liegt vor, wenn die einseitigen Grenzwerte von links und rechts verschieden sind. Die Funktion 'springt' an dieser Stelle."
            },
            {
                question: "Berechne: lim<sub>x→5</sub> (x² - 25)/(x - 5)",
                options: [
                    "0",
                    "5",
                    "10",
                    "25"
                ],
                correct: 2,
                explanation: "Faktorisiere: (x² - 25)/(x - 5) = (x-5)(x+5)/(x-5) = x+5 für x≠5. Dann: lim<sub>x→5</sub> (x+5) = 10."
            },
            {
                question: "Was bedeutet der unbestimmte Ausdruck 0/0?",
                options: [
                    "Der Grenzwert ist 0",
                    "Der Grenzwert ist 1",
                    "Man muss die Funktion algebraisch umformen",
                    "Der Grenzwert existiert nicht"
                ],
                correct: 2,
                explanation: "Der Ausdruck 0/0 ist unbestimmt. Man muss die Funktion algebraisch umformen (z.B. faktorisieren und kürzen), um den tatsächlichen Grenzwert zu bestimmen."
            },
            {
                question: "Berechne: lim<sub>x→2</sub> (x³ - 8)/(x - 2)",
                options: [
                    "4",
                    "8",
                    "12",
                    "16"
                ],
                correct: 2,
                explanation: "Nutze die 3. binomische Formel: x³ - 8 = (x-2)(x²+2x+4). Also: (x³-8)/(x-2) = x²+2x+4 für x≠2. Einsetzen: 4+4+4 = 12."
            },
            {
                question: "Für f(x) = (x²-4)/(x²-5x+6): Wo liegen Polstellen?",
                options: [
                    "Bei x = 2 und x = 3",
                    "Bei x = -2 und x = 2",
                    "Nur bei x = 3",
                    "Keine Polstellen"
                ],
                correct: 2,
                explanation: "Faktorisiere: Zähler = (x-2)(x+2), Nenner = (x-2)(x-3). Bei x = 2: hebbare Lücke (beide 0). Bei x = 3: Polstelle (nur Nenner 0)."
            },
            {
                question: "Was ist die Methode beim Erweitern mit Wurzeln?",
                options: [
                    "Mit der Wurzel selbst multiplizieren",
                    "Mit dem konjugierten Ausdruck multiplizieren",
                    "Die Wurzel quadrieren",
                    "Die Wurzel ableiten"
                ],
                correct: 1,
                explanation: "Bei Wurzeln erweitert man mit dem konjugierten Ausdruck (z.B. √x - 2 mit √x + 2), um die 3. binomische Formel anzuwenden und die Wurzel zu eliminieren."
            },
            {
                question: "Berechne: lim<sub>x→0</sub> (x² + 3x)/x",
                options: [
                    "0",
                    "1",
                    "3",
                    "∞"
                ],
                correct: 2,
                explanation: "Klammere x aus: (x² + 3x)/x = x(x + 3)/x = x + 3 für x≠0. Dann: lim<sub>x→0</sub> (x+3) = 3."
            },
            {
                question: "Bei welcher Funktion liegt eine Sprungstelle bei x = 1 vor?",
                options: [
                    "f(x) = (x²-1)/(x-1)",
                    "f(x) = 1/(x-1)",
                    "f(x) = { x für x<1; x+2 für x≥1 }",
                    "f(x) = x²"
                ],
                correct: 2,
                explanation: "Die stückweise definierte Funktion hat bei x = 1 eine Sprungstelle: lim<sub>x→1⁻</sub> = 1, aber lim<sub>x→1⁺</sub> = 3. Die Grenzwerte sind verschieden."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
