<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Zahlenfolgen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>🔢 Zahlenfolgen</h1>
            <p>Arithmetische & Geometrische Folgen, Monotonie & Beschränktheit</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionsContainer"></div>

            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Was ist eine Zahlenfolge?",
                options: [
                    "Eine Funktion mit dem Definitionsbereich ℝ",
                    "Eine reelle Funktion mit dem Definitionsbereich ℕ* = {1, 2, 3, 4, ...}",
                    "Eine beliebige Menge von Zahlen",
                    "Eine Folge von komplexen Zahlen"
                ],
                correct: 1,
                explanation: "Eine Zahlenfolge ist eine reelle Funktion mit dem Definitionsbereich ℕ* = {1, 2, 3, 4, ...}. Jeder natürlichen Zahl n wird ein Folgenglied aₙ zugeordnet."
            },
            {
                question: "Was ist der Unterschied zwischen expliziter und rekursiver Darstellung?",
                options: [
                    "Explizit berechnet jedes Glied direkt, rekursiv aus vorherigen Gliedern",
                    "Explizit ist immer einfacher als rekursiv",
                    "Rekursiv gibt die Summe an, explizit die einzelnen Glieder",
                    "Es gibt keinen Unterschied"
                ],
                correct: 0,
                explanation: "Bei der expliziten Darstellung wird jedes Folgenglied direkt als Funktion des Index berechnet: aₙ = f(n). Bei der rekursiven Darstellung wird jedes Glied aus vorherigen Gliedern berechnet."
            },
            {
                question: "Wann ist eine Folge nach oben beschränkt?",
                options: [
                    "Wenn alle Glieder positiv sind",
                    "Wenn es eine Zahl Sₒ gibt mit aₙ ≤ Sₒ für alle n",
                    "Wenn die Folge monoton wachsend ist",
                    "Wenn die Folge konvergiert"
                ],
                correct: 1,
                explanation: "Eine Folge ist nach oben beschränkt, wenn es eine obere Schranke Sₒ gibt, sodass alle Folgenglieder kleiner oder gleich Sₒ sind: aₙ ≤ Sₒ für alle n ∈ ℕ*."
            },
            {
                question: "Was bedeutet 'streng monoton wachsend'?",
                options: [
                    "aₙ₊₁ ≥ aₙ für alle n",
                    "aₙ₊₁ > aₙ für alle n",
                    "aₙ₊₁ = aₙ + 1 für alle n",
                    "Die Folge ist nach oben unbeschränkt"
                ],
                correct: 1,
                explanation: "Eine Folge ist streng monoton wachsend, wenn aₙ₊₁ > aₙ für alle n gilt. Das bedeutet, keine zwei aufeinanderfolgenden Glieder sind gleich – jedes Glied ist echt größer als das vorherige."
            },
            {
                question: "Was charakterisiert eine arithmetische Folge?",
                options: [
                    "Der Quotient aufeinanderfolgender Glieder ist konstant",
                    "Die Differenz aufeinanderfolgender Glieder ist konstant",
                    "Jedes Glied ist das Doppelte des vorherigen",
                    "Die Summe aller Glieder ist konstant"
                ],
                correct: 1,
                explanation: "Eine arithmetische Folge ist dadurch charakterisiert, dass die Differenz aufeinanderfolgender Glieder konstant ist: aₙ₊₁ - aₙ = d für alle n. Man addiert immer die gleiche Zahl d."
            },
            {
                question: "Wie lautet die explizite Formel für eine arithmetische Folge?",
                options: [
                    "aₙ = a₁ · qⁿ⁻¹",
                    "aₙ = a₁ + n · d",
                    "aₙ = a₁ + (n - 1) · d",
                    "aₙ = a₁ · (n - 1) + d"
                ],
                correct: 2,
                explanation: "Die explizite Formel für eine arithmetische Folge lautet: aₙ = a₁ + (n - 1) · d, wobei a₁ das erste Glied und d die Differenz ist."
            },
            {
                question: "Gegeben: a₁ = 5 und d = 3. Wie lautet a₁₀?",
                options: [
                    "35",
                    "32",
                    "38",
                    "30"
                ],
                correct: 1,
                explanation: "a₁₀ = a₁ + (10 - 1) · d = 5 + 9 · 3 = 5 + 27 = 32"
            },
            {
                question: "Wie lautet die Summenformel für arithmetische Folgen?",
                options: [
                    "sₙ = n · a₁",
                    "sₙ = n/2 · (a₁ + aₙ)",
                    "sₙ = a₁ · (1-qⁿ)/(1-q)",
                    "sₙ = a₁ + aₙ"
                ],
                correct: 1,
                explanation: "Die Summenformel für arithmetische Folgen lautet: sₙ = n/2 · (a₁ + aₙ) = n/2 · (2a₁ + (n-1)·d). Die Summe ist (Anzahl der Glieder / 2) · (erstes + letztes Glied)."
            },
            {
                question: "Was ist die Summe der ersten 100 natürlichen Zahlen (1+2+3+...+100)?",
                options: [
                    "5000",
                    "5050",
                    "10000",
                    "4950"
                ],
                correct: 1,
                explanation: "Mit der Gaußschen Summenformel: s₁₀₀ = 100/2 · (1 + 100) = 50 · 101 = 5050. Dies ist ein klassisches Beispiel für eine arithmetische Folge mit a₁ = 1 und d = 1."
            },
            {
                question: "Was charakterisiert eine geometrische Folge?",
                options: [
                    "Die Differenz aufeinanderfolgender Glieder ist konstant",
                    "Der Quotient aufeinanderfolgender Glieder ist konstant",
                    "Jedes Glied ist gleich",
                    "Die Summe ist immer endlich"
                ],
                correct: 1,
                explanation: "Eine geometrische Folge ist dadurch charakterisiert, dass der Quotient aufeinanderfolgender Glieder konstant ist: aₙ₊₁/aₙ = q für alle n. Man multipliziert immer mit der gleichen Zahl q."
            },
            {
                question: "Wie lautet die explizite Formel für eine geometrische Folge?",
                options: [
                    "aₙ = a₁ + (n - 1) · q",
                    "aₙ = a₁ · qⁿ",
                    "aₙ = a₁ · qⁿ⁻¹",
                    "aₙ = a₁ · (q - 1)ⁿ"
                ],
                correct: 2,
                explanation: "Die explizite Formel für eine geometrische Folge lautet: aₙ = a₁ · qⁿ⁻¹, wobei a₁ das erste Glied und q der Quotient ist."
            },
            {
                question: "Gegeben: a₁ = 2 und q = 3. Wie lautet a₅?",
                options: [
                    "243",
                    "162",
                    "81",
                    "54"
                ],
                correct: 1,
                explanation: "a₅ = a₁ · q⁴ = 2 · 3⁴ = 2 · 81 = 162 (beachte: Exponent ist n-1, also 5-1 = 4)"
            },
            {
                question: "Wie lautet die Summenformel für geometrische Folgen (q ≠ 1)?",
                options: [
                    "sₙ = n/2 · (a₁ + aₙ)",
                    "sₙ = a₁ · (1-qⁿ)/(1-q)",
                    "sₙ = a₁ · qⁿ",
                    "sₙ = n · a₁ · q"
                ],
                correct: 1,
                explanation: "Die Summenformel für geometrische Folgen lautet: sₙ = a₁ · (1-qⁿ)/(1-q) = a₁ · (qⁿ-1)/(q-1) für q ≠ 1. Für q = 1 gilt: sₙ = n · a₁."
            },
            {
                question: "Welche Folge ist arithmetisch?",
                options: [
                    "2, 4, 8, 16, 32, ...",
                    "1, 4, 9, 16, 25, ...",
                    "3, 7, 11, 15, 19, ...",
                    "1, 1/2, 1/4, 1/8, ..."
                ],
                correct: 2,
                explanation: "Die Folge 3, 7, 11, 15, 19, ... ist arithmetisch mit d = 4. Bei den anderen: 2, 4, 8, 16 ist geometrisch (q=2); 1, 4, 9, 16 sind Quadratzahlen; 1, 1/2, 1/4, 1/8 ist geometrisch (q=1/2)."
            },
            {
                question: "Welche Folge ist geometrisch?",
                options: [
                    "5, 10, 15, 20, 25, ...",
                    "1, 3, 5, 7, 9, ...",
                    "5, 10, 20, 40, 80, ...",
                    "1, 2, 4, 7, 11, ..."
                ],
                correct: 2,
                explanation: "Die Folge 5, 10, 20, 40, 80, ... ist geometrisch mit q = 2. Die Folgen 5, 10, 15, 20 und 1, 3, 5, 7 sind arithmetisch. Die Folge 1, 2, 4, 7, 11 ist weder arithmetisch noch geometrisch."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
