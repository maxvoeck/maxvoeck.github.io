<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Extrempunkte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .math-formula {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.2em;
            margin: 0.5rem 0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📊 Extrempunkte bestimmen</h1>
            <p>Notwendige und hinreichende Bedingungen</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionsContainer"></div>

            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Was ist eine Extremstelle?",
                options: [
                    "Der Funktionswert an einem Hoch- oder Tiefpunkt",
                    "Die x-Koordinate eines Hoch- oder Tiefpunkts",
                    "Der Punkt im Koordinatensystem (x, f(x))",
                    "Die Steigung an einem bestimmten Punkt"
                ],
                correct: 1,
                explanation: "Die Extremstelle ist die x-Koordinate (x<sub>min</sub> oder x<sub>max</sub>). Der Funktionswert heißt Extremwert, und der Punkt im Koordinatensystem heißt Extrempunkt."
            },
            {
                question: "Was ist die notwendige Bedingung für eine Extremstelle?",
                options: [
                    "f(x₀) = 0",
                    "f'(x₀) = 0",
                    "f''(x₀) = 0",
                    "f'(x₀) > 0"
                ],
                correct: 1,
                explanation: "Die notwendige Bedingung lautet f'(x₀) = 0. An einem Extrempunkt ist die Tangente waagerecht, also die Steigung null."
            },
            {
                question: "Warum ist die Bedingung f'(x₀) = 0 nur notwendig, aber nicht hinreichend?",
                options: [
                    "Weil f(x₀) auch null sein muss",
                    "Weil es auch ein Sattelpunkt sein könnte",
                    "Weil die zweite Ableitung immer positiv sein muss",
                    "Weil die Funktion stetig sein muss"
                ],
                correct: 1,
                explanation: "Aus f'(x₀) = 0 folgt nicht automatisch ein Extrempunkt. Es könnte auch ein Sattelpunkt vorliegen, wie bei f(x) = x³ an der Stelle x = 0."
            },
            {
                question: "Wann liegt ein Tiefpunkt (Minimum) vor?",
                options: [
                    "Wenn f'(x₀) = 0 und f''(x₀) < 0",
                    "Wenn f'(x₀) = 0 und f''(x₀) > 0",
                    "Wenn f'(x₀) > 0 und f''(x₀) = 0",
                    "Wenn f'(x₀) < 0 und f''(x₀) < 0"
                ],
                correct: 1,
                explanation: "Ein Tiefpunkt liegt vor, wenn f'(x₀) = 0 (notwendig) und f''(x₀) > 0 (hinreichend). Der Graph ist nach oben gekrümmt."
            },
            {
                question: "Wann liegt ein Hochpunkt (Maximum) vor?",
                options: [
                    "Wenn f'(x₀) = 0 und f''(x₀) > 0",
                    "Wenn f'(x₀) = 0 und f''(x₀) < 0",
                    "Wenn f'(x₀) < 0 und f''(x₀) = 0",
                    "Wenn f'(x₀) = 0 und f''(x₀) = 0"
                ],
                correct: 1,
                explanation: "Ein Hochpunkt liegt vor, wenn f'(x₀) = 0 (notwendig) und f''(x₀) < 0 (hinreichend). Der Graph ist nach unten gekrümmt."
            },
            {
                question: "Was ist die zweite Ableitung f''(x)?",
                options: [
                    "Die Steigung der Tangente",
                    "Die Ableitung der ersten Ableitung",
                    "Die Nullstelle der Funktion",
                    "Der y-Achsenabschnitt"
                ],
                correct: 1,
                explanation: "Die zweite Ableitung f''(x) ist die Ableitung der ersten Ableitung: f''(x) = d/dx[f'(x)]"
            },
            {
                question: "Gegeben: f(x) = x³ - 3x. Welche Extremstellen hat die Funktion? (f'(x) = 3x² - 3)",
                options: [
                    "x = 0",
                    "x = 1 und x = -1",
                    "x = 3 und x = -3",
                    "Keine Extremstellen"
                ],
                correct: 1,
                explanation: "f'(x) = 3x² - 3 = 0 ⟹ x² = 1 ⟹ x₁ = 1 und x₂ = -1"
            },
            {
                question: "Für f(x) = x³ - 3x mit f''(x) = 6x: Was liegt bei x = 1 vor?",
                options: [
                    "Hochpunkt, weil f''(1) < 0",
                    "Tiefpunkt, weil f''(1) > 0",
                    "Sattelpunkt, weil f''(1) = 0",
                    "Keine besondere Stelle"
                ],
                correct: 1,
                explanation: "f''(1) = 6 · 1 = 6 > 0, also liegt ein Tiefpunkt vor."
            },
            {
                question: "Was passiert, wenn f'(x₀) = 0 und f''(x₀) = 0?",
                options: [
                    "Es liegt immer ein Hochpunkt vor",
                    "Es liegt immer ein Tiefpunkt vor",
                    "Keine eindeutige Aussage möglich, weitere Untersuchung nötig",
                    "Es liegt nie ein Extrempunkt vor"
                ],
                correct: 2,
                explanation: "Wenn f''(x₀) = 0, liefert die zweite Ableitung keine Aussage. Man muss höhere Ableitungen untersuchen oder das Vorzeichenwechsel-Kriterium verwenden."
            },
            {
                question: "Bei welcher Funktion liegt bei x = 0 ein Sattelpunkt vor?",
                options: [
                    "f(x) = x²",
                    "f(x) = x³",
                    "f(x) = x⁴",
                    "f(x) = -x²"
                ],
                correct: 1,
                explanation: "Bei f(x) = x³ ist f'(0) = 0 und f''(0) = 0, aber f'''(0) = 6 ≠ 0. Da die erste nicht-verschwindende Ableitung ungerade ist, liegt ein Sattelpunkt vor."
            },
            {
                question: "Wie lautet der erste Schritt beim systematischen Bestimmen von Extrempunkten?",
                options: [
                    "Zweite Ableitung berechnen",
                    "Erste Ableitung berechnen",
                    "Funktionswerte berechnen",
                    "Graph zeichnen"
                ],
                correct: 1,
                explanation: "Der erste Schritt ist immer: Erste Ableitung f'(x) berechnen."
            },
            {
                question: "Gegeben: f(x) = x⁴ - 4x². Die Extremstellen sind x = 0, x = √2, x = -√2. Was liegt bei x = 0 vor?",
                options: [
                    "Tiefpunkt",
                    "Hochpunkt",
                    "Sattelpunkt",
                    "Wendepunkt"
                ],
                correct: 1,
                explanation: "Mit f''(x) = 12x² - 8 gilt: f''(0) = -8 < 0, also liegt ein Hochpunkt vor."
            },
            {
                question: "Was bedeutet 'lokales Extremum'?",
                options: [
                    "Das absolute Maximum oder Minimum im gesamten Definitionsbereich",
                    "Ein Extremum, das nur in einer Umgebung der Stelle das größte oder kleinste ist",
                    "Ein Extremum bei x = 0",
                    "Ein Extremum, das durch Grenzwerte bestimmt wird"
                ],
                correct: 1,
                explanation: "Ein lokales Extremum ist nur in einer Umgebung von x₀ extrem, nicht unbedingt im gesamten Definitionsbereich."
            },
            {
                question: "Für f(x) = xe⁻ˣ mit f'(x) = e⁻ˣ(1-x): Wo ist f'(x) = 0?",
                options: [
                    "x = 0",
                    "x = 1",
                    "x = e",
                    "Nirgends, da e⁻ˣ > 0"
                ],
                correct: 1,
                explanation: "f'(x) = e⁻ˣ(1-x) = 0. Da e⁻ˣ > 0 für alle x, muss 1-x = 0 sein, also x = 1."
            },
            {
                question: "Was ist der Unterschied zwischen Extremwert und Extremstelle?",
                options: [
                    "Es gibt keinen Unterschied",
                    "Extremwert ist f(x₀), Extremstelle ist x₀",
                    "Extremwert ist x₀, Extremstelle ist f(x₀)",
                    "Extremwert ist die Ableitung, Extremstelle ist die Funktion"
                ],
                correct: 1,
                explanation: "Die Extremstelle ist die x-Koordinate (x₀), der Extremwert ist der zugehörige Funktionswert f(x₀)."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
