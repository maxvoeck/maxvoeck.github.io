<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Güterarten in der Wirtschaft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📦 Güterarten in der Wirtschaft</h1>
            <p>Freie, Wirtschaftliche, Inferiore und Superiore Güter</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionsContainer"></div>

            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Was sind Güter im wirtschaftlichen Sinne?",
                options: [
                    "Nur materielle Produkte",
                    "Mittel zur Befriedigung menschlicher Bedürfnisse",
                    "Ausschließlich Dienstleistungen",
                    "Nur kostenlose Produkte"
                ],
                correct: 1,
                explanation: "Güter sind Mittel zur Befriedigung menschlicher Bedürfnisse. Sie können sowohl materiell (Sachgüter) als auch immateriell (Dienstleistungen) sein."
            },
            {
                question: "Was ist ein freies Gut?",
                options: [
                    "Ein Gut ohne Preis im Geschäft",
                    "Ein Gut, das vom Staat kostenlos verteilt wird",
                    "Ein im Überfluss vorhandenes, kostenloses Gut der Natur",
                    "Ein Gut, das illegal verteilt wird"
                ],
                correct: 2,
                explanation: "Freie Güter sind im Überfluss vorhanden und kostenlos. Sie werden von der Natur bereitgestellt, wie z.B. Luft, Sonnenlicht oder Sand."
            },
            {
                question: "Welches dieser Güter ist typischerweise ein wirtschaftliches Gut?",
                options: [
                    "Sonnenlicht",
                    "Luft auf dem Land",
                    "Computer",
                    "Schnee in der Arktis"
                ],
                correct: 2,
                explanation: "Ein Computer ist ein wirtschaftliches Gut, da er begrenzt verfügbar ist und durch wirtschaftliche Aktivitäten produziert werden muss."
            },
            {
                question: "Warum kann saubere Luft in Großstädten zum wirtschaftlichen Gut werden?",
                options: [
                    "Wegen staatlicher Regulierung",
                    "Wegen Knappheit durch Luftverschmutzung",
                    "Wegen technischer Innovation",
                    "Wegen steigender Nachfrage"
                ],
                correct: 1,
                explanation: "Saubere Luft wird knapp durch Luftverschmutzung in Großstädten. Knappheit ist der Hauptgrund für den Übergang von freien zu wirtschaftlichen Gütern."
            },
            {
                question: "Was misst die Einkommenselastizität der Nachfrage?",
                options: [
                    "Die Preisveränderung eines Gutes",
                    "Die Produktionskosten",
                    "Die Reaktion der Nachfrage auf Einkommensänderungen",
                    "Die Qualität eines Produkts"
                ],
                correct: 2,
                explanation: "Die Einkommenselastizität (E_Y) misst, wie stark die Nachfrage auf Einkommensänderungen reagiert: E_Y = (% Änderung der Menge) / (% Änderung des Einkommens)."
            },
            {
                question: "Was kennzeichnet ein inferiores Gut?",
                options: [
                    "Schlechte Qualität",
                    "Hoher Preis",
                    "Die Nachfrage sinkt bei steigendem Einkommen (E_Y < 0)",
                    "Nur im Ausland erhältlich"
                ],
                correct: 2,
                explanation: "Bei inferioren Gütern sinkt die Nachfrage, wenn das Einkommen steigt (E_Y < 0). Beispiele: Instant-Nudeln, No-Name-Produkte."
            },
            {
                question: "Das Einkommen steigt um 10%, die Nachfrage nach einem Gut steigt um 5%. Welche Einkommenselastizität liegt vor?",
                options: [
                    "E_Y = 0,5 (unelastisch normal)",
                    "E_Y = 2 (elastisch/superior)",
                    "E_Y = -0,5 (inferior)",
                    "E_Y = 0 (vollkommen unelastisch)"
                ],
                correct: 0,
                explanation: "E_Y = 5% / 10% = 0,5. Da 0 < E_Y < 1, handelt es sich um ein unelastisches normales Gut. Die Nachfrage steigt schwächer als das Einkommen."
            },
            {
                question: "Welches Gut ist typischerweise ein superiores (elastisches) Gut?",
                options: [
                    "Brot",
                    "Instant-Nudeln",
                    "Luxusuhren",
                    "Salz"
                ],
                correct: 2,
                explanation: "Luxusuhren sind superiore Güter (E_Y > 1). Die Nachfrage steigt überproportional mit dem Einkommen."
            },
            {
                question: "Was bedeutet eine Einkommenselastizität von E_Y = 0?",
                options: [
                    "Inferiores Gut",
                    "Vollkommen unelastisches Gut – Nachfrage ändert sich nicht",
                    "Superiores Gut",
                    "Normales Gut"
                ],
                correct: 1,
                explanation: "Bei E_Y = 0 ändert sich die Nachfrage überhaupt nicht bei Einkommensänderungen. Beispiel: lebenswichtige Medikamente."
            },
            {
                question: "Was sind meritorische Güter?",
                options: [
                    "Güter, die zu wenig nachgefragt werden und vom Staat gefördert werden",
                    "Luxusgüter",
                    "Güter, die der Staat verbietet",
                    "Güter mit hoher Einkommenselastizität"
                ],
                correct: 0,
                explanation: "Meritorische Güter sind gesellschaftlich wertvoll, werden aber zu wenig nachgefragt. Der Staat fördert sie durch Subventionen, niedrige Steuern oder Pflichten. Beispiele: Bildung, Impfungen."
            },
            {
                question: "Welches ist ein Beispiel für ein meritorisches Gut?",
                options: [
                    "Zigaretten",
                    "Alkohol",
                    "Bildung",
                    "Glücksspiel"
                ],
                correct: 2,
                explanation: "Bildung ist ein meritorisches Gut. Sie hat positive externe Effekte und wird vom Staat gefördert (z.B. kostenlose Schulbildung, Subventionen)."
            },
            {
                question: "Was sind demeritorische Güter?",
                options: [
                    "Güter, die zu viel nachgefragt werden und vom Staat reguliert werden",
                    "Güter mit niedriger Qualität",
                    "Güter, die exportiert werden",
                    "Güter mit negativer Einkommenselastizität"
                ],
                correct: 0,
                explanation: "Demeritorische Güter haben negative gesellschaftliche Effekte und werden zu viel nachgefragt. Der Staat reguliert sie durch Steuern, Verbote oder Warnhinweise."
            },
            {
                question: "Welche Maßnahme wendet der Staat bei demeritorischen Gütern an?",
                options: [
                    "Subventionen",
                    "Höhere Besteuerung und Werbeverbote",
                    "Kostenloser Zugang",
                    "Niedrigere Steuersätze"
                ],
                correct: 1,
                explanation: "Bei demeritorischen Gütern nutzt der Staat Maßnahmen wie höhere Steuern (z.B. Tabaksteuer), Werbeverbote, Warnhinweise und Konsumverbote."
            },
            {
                question: "Warum greift der Staat bei meritorischen Gütern ein?",
                options: [
                    "Wegen zu hoher Preise",
                    "Wegen Marktversagen durch Informationsmangel, Gegenwartspräferenz und nicht berücksichtigten externen Effekten",
                    "Wegen zu großer Nachfrage",
                    "Wegen internationaler Verpflichtungen"
                ],
                correct: 1,
                explanation: "Der Staat greift ein, weil Marktversagen vorliegt: Menschen unterschätzen den Nutzen (irrationale Entscheidungen), haben mangelnde Informationen, denken kurzfristig oder berücksichtigen externe Effekte nicht."
            },
            {
                question: "Das Einkommen steigt um 20%, die Nachfrage nach Restaurantbesuchen steigt um 40%. Welche Art von Gut liegt vor?",
                options: [
                    "Inferiores Gut",
                    "Vollkommen unelastisches Gut",
                    "Unelastisches normales Gut",
                    "Elastisches/superiores Gut (E_Y > 1)"
                ],
                correct: 3,
                explanation: "E_Y = 40% / 20% = 2. Da E_Y > 1, ist es ein elastisches/superiores Gut. Die Nachfrage steigt stärker als das Einkommen – typisch für Luxusgüter."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
