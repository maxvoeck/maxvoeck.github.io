<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Integrationsverfahren</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 2rem;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .math-formula {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.2em;
            margin: 0.5rem 0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: #f0f1f3;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-letter {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem auto;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .quiz-header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>🔧 Quiz: Integrationsverfahren</h1>
            <p>Substitution, Partielle Integration & Partialbruchzerlegung</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-content">
            <div id="questionsContainer"></div>

            <div class="results-container" id="resultsContainer">
                <div class="result-message" id="resultMessage"></div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Erreicht</div>
                </div>
                <div class="result-details">
                    <div class="result-stat">
                        <div class="result-stat-number" id="correctCount">0</div>
                        <div class="result-stat-label">Gemeistert</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="incorrectCount">0</div>
                        <div class="result-stat-label">Wiederholt</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-number" id="totalCount">0</div>
                        <div class="result-stat-label">Gesamt</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Quiz wiederholen</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Wann verwendet man die Substitutionsmethode?",
                options: [
                    "Bei Produkten zweier Funktionen",
                    "Bei verketteten Funktionen oder wenn die Ableitung der inneren Funktion als Faktor erscheint",
                    "Bei rationalen Funktionen",
                    "Bei einfachen Polynomen"
                ],
                correct: 1,
                explanation: "Die Substitution wird bei verketteten Funktionen angewendet, besonders wenn die Ableitung der inneren Funktion als Faktor im Integranden erscheint."
            },
            {
                question: "Was ist der erste Schritt bei der Substitutionsmethode?",
                options: [
                    "Integration durchführen",
                    "Wähle eine geeignete Substitution u = g(x)",
                    "Resubstitution",
                    "Partialbruchzerlegung"
                ],
                correct: 1,
                explanation: "Der erste Schritt ist die Wahl einer geeigneten Substitution u = g(x), gefolgt von der Berechnung des Differentials du = g'(x) dx."
            },
            {
                question: "Was ist das Ergebnis von ∫2x·e^(x²) dx mit Substitution u = x²?",
                options: [
                    "2e^(x²) + C",
                    "e^(x²) + C",
                    "x²e^(x²) + C",
                    "e^x + C"
                ],
                correct: 1,
                explanation: "Mit u = x² und du = 2x dx wird das Integral zu ∫e^u du = e^u + C = e^(x²) + C."
            },
            {
                question: "Wann verwendet man partielle Integration?",
                options: [
                    "Bei verketteten Funktionen",
                    "Bei gebrochenrationalen Funktionen",
                    "Bei Produkten zweier Funktionen",
                    "Nur bei Polynomen"
                ],
                correct: 2,
                explanation: "Partielle Integration wird zur Integration von Produkten zweier Funktionen verwendet und basiert auf der Umkehrung der Produktregel."
            },
            {
                question: "Wie lautet die Formel für partielle Integration?",
                options: [
                    "∫u·v' dx = uv - ∫u'·v dx",
                    "∫u·v dx = u'v + ∫uv' dx",
                    "∫u·v dx = uv + C",
                    "∫u/v dx = u·ln(v) + C"
                ],
                correct: 0,
                explanation: "Die Formel der partiellen Integration lautet: ∫u(x)·v'(x) dx = u(x)·v(x) - ∫u'(x)·v(x) dx"
            },
            {
                question: "Was bedeutet die LIATE-Regel?",
                options: [
                    "Eine Formel für Logarithmen",
                    "Die Reihenfolge der Priorität für die Wahl von u(x) bei partieller Integration",
                    "Eine Substitutionsregel",
                    "Eine Ableitungsregel"
                ],
                correct: 1,
                explanation: "LIATE gibt die Priorität an: Logarithmus, Inverse trig., Algebraisch, Trigonometrisch, Exponentiell. Die höchste Priorität wird als u(x) gewählt."
            },
            {
                question: "Was ist das Ergebnis von ∫ln(x) dx mit partieller Integration?",
                options: [
                    "x·ln(x) + x + C",
                    "x·ln(x) - x + C",
                    "ln(x²) + C",
                    "1/x + C"
                ],
                correct: 1,
                explanation: "Mit u = ln(x) und v' = 1 ergibt sich: ∫ln(x) dx = x·ln(x) - ∫x·(1/x) dx = x·ln(x) - x + C."
            },
            {
                question: "Wann verwendet man Partialbruchzerlegung?",
                options: [
                    "Bei Exponentialfunktionen",
                    "Bei rationalen Funktionen P(x)/Q(x)",
                    "Bei trigonometrischen Funktionen",
                    "Bei Wurzelfunktionen"
                ],
                correct: 1,
                explanation: "Partialbruchzerlegung wird bei rationalen Funktionen P(x)/Q(x) angewendet, wobei P und Q Polynome sind."
            },
            {
                question: "Was ist die Voraussetzung für Partialbruchzerlegung?",
                options: [
                    "Grad(P) > Grad(Q)",
                    "Grad(P) = Grad(Q)",
                    "Grad(P) < Grad(Q) (echt gebrochenrational)",
                    "Es gibt keine Voraussetzung"
                ],
                correct: 2,
                explanation: "Der Zählergrad muss kleiner sein als der Nennergrad (Grad(P) < Grad(Q)). Falls nicht, muss zuerst eine Polynomdivision durchgeführt werden."
            },
            {
                question: "Wie lautet der Ansatz für 1/(x-a₁)(x-a₂) mit verschiedenen einfachen Nullstellen?",
                options: [
                    "A/(x-a₁) + B/(x-a₂)",
                    "A(x-a₁) + B(x-a₂)",
                    "(Ax+B)/(x-a₁)(x-a₂)",
                    "A·x + B"
                ],
                correct: 0,
                explanation: "Bei einfachen verschiedenen reellen Nullstellen lautet der Ansatz: P(x)/Q(x) = A/(x-a₁) + B/(x-a₂)."
            },
            {
                question: "Welcher Ansatz gilt für eine k-fache Nullstelle bei x = a?",
                options: [
                    "Nur A/(x-a)",
                    "A/(x-a) + A/(x-a)² + ... + A/(x-a)^k",
                    "A₁/(x-a) + A₂/(x-a)² + ... + Aₖ/(x-a)^k",
                    "(Ax+B)/(x-a)^k"
                ],
                correct: 2,
                explanation: "Bei k-facher Nullstelle: A₁/(x-a) + A₂/(x-a)² + ... + Aₖ/(x-a)^k mit unterschiedlichen Koeffizienten."
            },
            {
                question: "Was ist ∫1/(x²-1) dx nach Partialbruchzerlegung?",
                options: [
                    "ln|x²-1| + C",
                    "(1/2)ln|(x-1)/(x+1)| + C",
                    "ln|x-1| + C",
                    "arctan(x) + C"
                ],
                correct: 1,
                explanation: "Mit 1/(x²-1) = (1/2)/(x-1) - (1/2)/(x+1) ergibt sich: (1/2)ln|x-1| - (1/2)ln|x+1| + C = (1/2)ln|(x-1)/(x+1)| + C."
            },
            {
                question: "Bei ∫x·e^x dx: Was wählt man nach LIATE als u?",
                options: [
                    "u = x (algebraisch hat höhere Priorität als exponentiell)",
                    "u = e^x",
                    "Beide Möglichkeiten sind gleich gut",
                    "LIATE ist hier nicht anwendbar"
                ],
                correct: 0,
                explanation: "Nach LIATE hat 'Algebraisch' (x) höhere Priorität als 'Exponentiell' (e^x), daher wählt man u = x und v' = e^x."
            },
            {
                question: "Was bedeutet 'Resubstitution' bei der Substitutionsmethode?",
                options: [
                    "Das Einsetzen der Integrationsgrenzen",
                    "Das Ersetzen von u wieder durch g(x) im Endergebnis",
                    "Das Ableiten der Funktion",
                    "Das Faktorisieren des Nenners"
                ],
                correct: 1,
                explanation: "Resubstitution ist der letzte Schritt: Nach der Integration bezüglich u wird u wieder durch g(x) ersetzt, um das Ergebnis in der ursprünglichen Variable x zu erhalten."
            },
            {
                question: "Welche Methode ist für ∫sin(x)·cos(x) dx am besten geeignet?",
                options: [
                    "Partialbruchzerlegung",
                    "Substitution mit u = sin(x) oder u = cos(x)",
                    "Partielle Integration",
                    "Direkte Integration"
                ],
                correct: 1,
                explanation: "Am besten verwendet man Substitution: Mit u = sin(x) ist du = cos(x)dx, also ∫sin(x)·cos(x) dx = ∫u du = (1/2)u² + C = (1/2)sin²(x) + C."
            }
        ];

        let queue = [];
        let currentIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let wrongSet = new Set();
        let answeredCorrectly = new Set();

        function initQuiz() {
            queue = quizData.map((_, i) => i);
            currentIndex = 0;
            score = 0;
            totalAnswered = 0;
            wrongSet = new Set();
            answeredCorrectly = new Set();
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            if (currentIndex >= queue.length) {
                showResults();
                return;
            }

            const qIdx = queue[currentIndex];
            const q = quizData[qIdx];
            const container = document.getElementById('questionsContainer');
            const isRetry = wrongSet.has(qIdx);

            container.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">${isRetry ? '🔁 Wiederholung – ' : ''}Frage ${totalAnswered + 1} · ${answeredCorrectly.size} von ${quizData.length} gemeistert</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options-current">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${qIdx}, ${i})">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-current">
                        <div class="feedback-title"></div>
                        <div class="feedback-text"></div>
                    </div>
                    <div class="controls">
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>
                            Weiter →
                        </button>
                    </div>
                </div>
            `;

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            const optionsContainer = document.getElementById('options-current');
            const options = optionsContainer.querySelectorAll('.option');
            const correct = quizData[questionIndex].correct;

            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            options[optionIndex].classList.add(optionIndex === correct ? 'correct' : 'incorrect');
            options[correct].classList.add('correct');

            const feedback = document.getElementById('feedback-current');
            feedback.classList.add('show');

            if (optionIndex === correct) {
                score++;
                answeredCorrectly.add(questionIndex);
                wrongSet.delete(questionIndex);
                feedback.classList.add('correct');
                feedback.querySelector('.feedback-title').textContent = '✓ Richtig!';
            } else {
                wrongSet.add(questionIndex);
                answeredCorrectly.delete(questionIndex);
                feedback.classList.add('incorrect');
                feedback.querySelector('.feedback-title').textContent = '✗ Falsch – kommt in 4 Fragen wieder!';
                // Insert this question again 4 positions later
                const insertPos = Math.min(currentIndex + 5, queue.length);
                queue.splice(insertPos, 0, questionIndex);
            }

            feedback.querySelector('.feedback-text').innerHTML = quizData[questionIndex].explanation;
            totalAnswered++;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                showResults();
            } else {
                renderCurrentQuestion();
            }
        }

        function updateProgress() {
            const progress = (answeredCorrectly.size / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('questionsContainer').innerHTML = '';
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');

            const percentage = Math.round((quizData.length / totalAnswered) * 100);
            document.getElementById('scoreNumber').textContent = Math.min(percentage, 100) + '%';
            document.getElementById('correctCount').textContent = quizData.length;
            document.getElementById('incorrectCount').textContent = totalAnswered - quizData.length;
            document.getElementById('totalCount').textContent = totalAnswered;

            let message = '';
            if (totalAnswered === quizData.length) {
                message = 'Perfekt! Alles auf Anhieb richtig!';
            } else if (totalAnswered <= quizData.length + 3) {
                message = 'Sehr gut! Fast alles beim ersten Versuch!';
            } else if (totalAnswered <= quizData.length + 6) {
                message = 'Gut gemacht! Die Wiederholungen haben geholfen!';
            } else {
                message = 'Geschafft! Wiederhole das Thema nochmal zur Sicherheit!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultsContainer').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
